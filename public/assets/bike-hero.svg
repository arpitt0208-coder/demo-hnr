<svg width="620" height="480" viewBox="0 0 620 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E8E8"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C0C0C0"/>
      <stop offset="50%" stop-color="#F0F0F0"/>
      <stop offset="100%" stop-color="#A0A0A0"/>
    </linearGradient>
    <filter id="bikeShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>
  <g filter="url(#bikeShadow)">
    <!-- Rear wheel -->
    <circle cx="155" cy="370" r="72" fill="#1A1A1A" stroke="#333" stroke-width="3"/>
    <circle cx="155" cy="370" r="55" fill="none" stroke="#444" stroke-width="1.5"/>
    <circle cx="155" cy="370" r="38" fill="none" stroke="#555" stroke-width="1"/>
    <circle cx="155" cy="370" r="12" fill="#888"/>
    <!-- Front wheel -->
    <circle cx="465" cy="370" r="72" fill="#1A1A1A" stroke="#333" stroke-width="3"/>
    <circle cx="465" cy="370" r="55" fill="none" stroke="#444" stroke-width="1.5"/>
    <circle cx="465" cy="370" r="38" fill="none" stroke="#555" stroke-width="1"/>
    <circle cx="465" cy="370" r="12" fill="#888"/>
    <!-- Frame -->
    <path d="M155 370 L270 270 L330 240 L420 280 L465 370" stroke="#555" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M270 270 L310 190 L370 170" stroke="#666" stroke-width="4" fill="none"/>
    <!-- Fuel tank - white -->
    <ellipse cx="330" cy="220" rx="65" ry="38" fill="url(#whiteGrad)" stroke="#DDD" stroke-width="1.5" transform="rotate(-8 330 220)"/>
    <ellipse cx="330" cy="218" rx="50" ry="28" fill="#FFFFFF" transform="rotate(-8 330 218)"/>
    <!-- RE logo hint -->
    <text x="318" y="226" fill="#999" font-size="14" font-weight="bold" font-family="serif" transform="rotate(-8 318 226)">RE</text>
    <!-- Seat -->
    <path d="M255 265 Q295 245 340 255 Q365 260 375 275 L355 295 Q300 285 255 290 Z" fill="#222"/>
    <!-- Handlebars -->
    <path d="M395 185 L430 175 L455 185" stroke="url(#chrome)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Mirrors -->
    <circle cx="432" cy="172" r="6" fill="#CCC" stroke="#999"/>
    <!-- Headlight -->
    <circle cx="448" cy="200" r="20" fill="#F8F8F8" stroke="#CCC" stroke-width="2"/>
    <circle cx="448" cy="200" r="12" fill="#FFF" stroke="#DDD"/>
    <!-- Windscreen -->
    <path d="M400 180 L418 135 L438 145 L425 195 Z" fill="#E0E0E0" opacity="0.7"/>
    <!-- Engine -->
    <rect x="230" y="300" width="90" height="55" rx="6" fill="#444" stroke="#555"/>
    <rect x="245" y="310" width="25" height="35" rx="3" fill="#555"/>
    <!-- Exhaust -->
    <path d="M175 345 Q110 330 85 280" stroke="url(#chrome)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Forks -->
    <line x1="440" y1="205" x2="458" y2="300" stroke="#888" stroke-width="4"/>
    <line x1="452" y1="205" x2="468" y2="300" stroke="#888" stroke-width="4"/>
    <!-- Fenders -->
    <path d="M100 340 Q155 310 210 340" stroke="#EEE" stroke-width="6" fill="none"/>
    <path d="M410 340 Q465 310 520 340" stroke="#EEE" stroke-width="6" fill="none"/>
    <!-- Side panels white -->
    <path d="M280 290 L320 280 L340 310 L290 320 Z" fill="#F5F5F5" stroke="#DDD"/>
  </g>
</svg>
